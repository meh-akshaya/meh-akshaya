from http.server import BaseHTTPRequestHandler
from datetime import datetime, timezone
from pathlib import Path
import requests


OWNER = "meh-akshaya"
REPO = "meh-akshaya"


class handler(BaseHTTPRequestHandler):
    def do_GET(self):
        url = f"https://api.github.com/repos/{OWNER}/{REPO}/commits"

        response = requests.get(url)

        if response.status_code != 200:
            self.send_response(500)
            self.end_headers()
            self.wfile.write(b"GitHub API Error")
            return

        commits = response.json()

        commit_time = None

        for commit in commits:
            message = commit["commit"]["message"]

            if message != "Update commit counter":
                date = commit["commit"]["author"]["date"]
                commit_time = datetime.fromisoformat(
                    date.replace("Z", "+00:00")
                )
                break

        if commit_time is None:
            commit_time = datetime.now(timezone.utc)

        now = datetime.now(timezone.utc)

        diff = now - commit_time

        days = diff.days
        hours = diff.seconds // 3600
        minutes = (diff.seconds % 3600) // 60

        elapsed = (
            f"{days:02d} days "
            f"{hours:02d} hours "
            f"{minutes:02d} minutes ago"
        )

        last_login = now.strftime("%a %b %d %H:%M UTC")

        svg = Path("assets/terminal.svg").read_text()

        svg = svg.replace("{{LAST_LOGIN}}", last_login)
        svg = svg.replace("{{LAST_COMMIT}}", elapsed)

        self.send_response(200)
        self.send_header("Content-Type", "image/svg+xml")
        self.end_headers()
        self.wfile.write(svg.encode("utf-8"))