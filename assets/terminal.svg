<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="420"
     viewBox="0 0 900 420">

    <!-- Background -->
    <rect x="0" y="0"
          width="900"
          height="420"
          rx="14"
          fill="#1e1e1e"/>

    <!-- Title Bar -->
    <rect x="0"
          y="0"
          width="900"
          height="34"
          rx="14"
          fill="#2b2b2b"/>

    <!-- Square off bottom of title bar -->
    <rect x="0"
          y="17"
          width="900"
          height="17"
          fill="#2b2b2b"/>

    <!-- macOS Buttons -->
    <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="17" r="6" fill="#febc2e"/>
    <circle cx="60" cy="17" r="6" fill="#28c840"/>

    <g
        fill="#f5f5f5"
        font-size="20"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">

        <text x="18" y="72">
            Last login: {{LAST_LOGIN}}
        </text>

        <text x="18" y="132">
meh-akshaya % whoami
        </text>

        <text x="18" y="166">
lazy.developer
        </text>

        <text x="18" y="230">
meh-akshaya % last_commit
        </text>

        <text x="18" y="264">
{{LAST_COMMIT}}
        </text>

        <text x="18" y="338">
meh-akshaya % █
        </text>

    </g>

</svg>